name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aotune_test
          POSTGRES_USER: aotune
          POSTGRES_PASSWORD: aotune
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aotune -d aotune_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AOTUNE_APP_ENV: test
      AOTUNE_AGENT_PROVIDER: fake
      AOTUNE_TEST_DATABASE_URL: postgresql+asyncpg://aotune:aotune@localhost:5432/aotune_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run pytest
