services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aotune
      POSTGRES_USER: aotune
      POSTGRES_PASSWORD: aotune
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aotune -d aotune"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: aotune_test
      POSTGRES_USER: aotune
      POSTGRES_PASSWORD: aotune
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aotune -d aotune_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./apps/api
    environment:
      AOTUNE_DATABASE_URL: postgresql+asyncpg://aotune:aotune@postgres:5432/aotune
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
    env_file:
      - path: ./apps/api/.env.local
        required: false
    environment:
      AOTUNE_DATABASE_URL: postgresql+asyncpg://aotune:aotune@postgres:5432/aotune
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  api-test:
    build:
      context: ./apps/api
      args:
        UV_SYNC_FLAGS: --dev
    profiles: ["test"]
    environment:
      AOTUNE_APP_ENV: test
      AOTUNE_AGENT_PROVIDER: fake
      AOTUNE_TEST_DATABASE_URL: postgresql+asyncpg://aotune:aotune@postgres-test:5432/aotune_test
    command: ["sh", "-c", "uv run ruff check . && uv run pytest"]
    depends_on:
      postgres-test:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
